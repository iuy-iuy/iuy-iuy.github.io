baseURL = 'https://iuy-iuy.github.io/'
languageCode = 'zh-cn'
title = 'OmAIgo'
theme = 'PaperMod'

# 防御性设计：让文章永久链接只看 slug，不受文件目录结构影响
[permalinks]
  posts = "/p/:slug/"

# ==========================================
# 1. 基础参数 (必须且只能出现一次，放在最前面)
# ==========================================
[params]
  defaultTheme = "auto"      # 自动跟随系统深色/浅色模式
  ShowReadingTime = true     # 显示阅读时间
  ShowWordCount = true       # 显示字数
  ShowBreadCrumbs = true     # 显示面包屑导航
  ShowPostNavLinks = true    # 文章底部显示“上一篇/下一篇”
  ShowToc = true             # 长文章侧边栏目录
  TocOpen = false            # 默认折叠目录

# ==========================================
# 2. 首页个人名片设定 (Home Info)
# ==========================================
[params.homeInfoParams]
  Title = "Hi, 欢迎来到 OmAIgo 💡" 
  Content = """
  在这里，我致力于拆解前沿科技与复杂系统。
  - 🧠 关注大模型架构、脑机接口与前沿 AI 进展。
  - 🛠️ 追求极简、高信噪比的信息输出。
  """

# 添加你的社交链接图标
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/iuy-iuy"

# ==========================================
# 3. 顶部导航栏 (Navigation Menu)
# ==========================================
[[menu.main]]
  name = "🏠 首页"
  url = "/"
  weight = 10

[[menu.main]]
  name = "📚 归档"
  url = "/archives/"
  weight = 20

[[menu.main]]
  name = "🔍 搜索"
  url = "/search/"
  weight = 30

[[menu.main]]
  name = "🙋‍♂️ 关于"
  url = "/about/"
  weight = 40
